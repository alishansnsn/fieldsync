services:
  - type: web
    name: fieldsync
    runtime: node
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
